apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      volumes:
      - name: vault-secrets
        emptyDir: {}
      initContainers:
      - name: vault-init
        image: hashicorp/vault:1.13.0
        env:
        - name: VAULT_ADDR
          value: "http://vault:8200"
        - name: VAULT_TOKEN
          value: "root"
        command: ["/bin/sh", "-c"]
        # Fetch the password from Vault and write it to the shared volume
        args: ["sleep 5 && until vault kv get -field=password secret/auth-db > /vault/secrets/db-password.txt 2>/dev/stderr; do echo waiting for Vault secret; sleep 2; done"]
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
      containers:
      - name: auth-service
        image: health-bridge/auth-identity-service:1.0
        command: ["/bin/sh", "-c"]
        # Read the password from the file and pass it as a Spring Boot property!
        args: ["export DB_PASS=$(cat /vault/secrets/db-password.txt) && java -jar /app.jar --spring.datasource.password=${DB_PASS}"]
        env:
        - name: EUREKA_SERVER_URL
          value: "http://discovery-server:9095/eureka/"
        - name: AUTH_IDENTITY_DB_URL
          value: "jdbc:postgresql://postgres-db:5432/auth_identity_db"
        - name: APP_CORS_ALLOWED_ORIGIN_PATTERNS
          value: "*"
        ports:
        - containerPort: 9092
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092
  type: ClusterIP
