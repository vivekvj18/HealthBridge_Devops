apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: health-bridge/auth-identity-service:1.0
        env:
        - name: EUREKA_SERVER_URL
          value: "http://discovery-server:9095/eureka/"
        - name: AUTH_IDENTITY_DB_URL
          value: "jdbc:postgresql://postgres-db:5432/auth_identity_db"
        - name: APP_CORS_ALLOWED_ORIGIN_PATTERNS
          value: "*"
        ports:
        - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092
  type: ClusterIP
