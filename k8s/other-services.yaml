# Notification Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: health-bridge/notification-audit-service:1.0
        env:
        - name: EUREKA_SERVER_URL
          value: "http://discovery-server:9095/eureka/"
        - name: NOTIFICATION_AUDIT_DB_URL
          value: "jdbc:postgresql://postgres-db:5432/notification_audit_db"
        ports:
        - containerPort: 9099
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 9099
      targetPort: 9099
  type: ClusterIP
---
