---
# Hospital B Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-hospital-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-hospital-b
  template:
    metadata:
      labels:
        app: frontend-hospital-b
    spec:
      containers:
      - name: frontend-hospital-b
        image: health-bridge-frontend-hospital-b:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5175
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-hospital-b
spec:
  selector:
    app: frontend-hospital-b
  ports:
    - protocol: TCP
      port: 5175
      targetPort: 5175
  type: NodePort
