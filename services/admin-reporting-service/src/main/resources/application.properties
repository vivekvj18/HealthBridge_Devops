spring.application.name=admin-reporting-service
server.port=${SERVER_PORT:9090}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:9095/eureka/}
eureka.instance.prefer-ip-address=true

spring.datasource.jdbc-url=${ADMIN_REPORTING_DB_URL:${NOTIFICATION_AUDIT_DB_URL:jdbc:postgresql://localhost:5432/notification_audit_db}}
spring.datasource.username=${ADMIN_REPORTING_DB_USERNAME:${NOTIFICATION_AUDIT_DB_USERNAME:fhir_user}}
spring.datasource.password=${ADMIN_REPORTING_DB_PASSWORD:${NOTIFICATION_AUDIT_DB_PASSWORD:fhir_pass}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
jwt.secret=${JWT_SECRET:change-me-to-a-256-bit-base64-secret-in-prod-at-least-32-chars}
jwt.access-token-expiry-seconds=${JWT_ACCESS_TOKEN_EXPIRY_SECONDS:3600}
jwt.refresh-token-expiry-seconds=${JWT_REFRESH_TOKEN_EXPIRY_SECONDS:604800}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=admin-reporting-service
info.app.phase=phase-2-skeleton
info.app.database=notification_audit_db
