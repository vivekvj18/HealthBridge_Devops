# Test profile — uses H2 in-memory so mvn test does not need running PostgreSQL instances
spring.datasource.fhir-main.jdbc-url=jdbc:h2:mem:fhir_main;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.fhir-main.driver-class-name=org.h2.Driver
spring.datasource.fhir-main.username=sa
spring.datasource.fhir-main.password=

spring.datasource.hospital-a.jdbc-url=jdbc:h2:mem:hospital_a;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.hospital-a.driver-class-name=org.h2.Driver
spring.datasource.hospital-a.username=sa
spring.datasource.hospital-a.password=

app.mongo.hospital-b.uri=mongodb://localhost:27017
app.mongo.hospital-b.database=hospital_b_test
app.mongo.hospital-b.auto-index-creation=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT config for test context
jwt.secret=test-secret-key-for-unit-tests-minimum-32-chars-long
jwt.access-token-expiry-seconds=900
jwt.refresh-token-expiry-seconds=604800
