spring.application.name=health-bridge
spring.profiles.default=local
server.port=${SERVER_PORT:8085}

# http://localhost:8080/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

springdoc.show-actuator=false

# ── Primary datasource (auth, consent, identity, audit) ──
spring.datasource.fhir-main.jdbc-url=${FHIR_MAIN_DB_URL:jdbc:postgresql://localhost:5432/fhir_main}
spring.datasource.fhir-main.username=${FHIR_MAIN_DB_USERNAME:fhir_user}
spring.datasource.fhir-main.password=${FHIR_MAIN_DB_PASSWORD:fhir_pass}
spring.datasource.fhir-main.driver-class-name=org.postgresql.Driver

# ── Hospital A datasource ────────────────────────────────
spring.datasource.hospital-a.jdbc-url=${HOSPITAL_A_DB_URL:jdbc:postgresql://localhost:5432/hospital_a_db}
spring.datasource.hospital-a.username=${HOSPITAL_A_DB_USERNAME:fhir_user}
spring.datasource.hospital-a.password=${HOSPITAL_A_DB_PASSWORD:fhir_pass}
spring.datasource.hospital-a.driver-class-name=org.postgresql.Driver

# ── Hospital B native store (MongoDB) ─────────────────────
app.mongo.hospital-b.uri=${HOSPITAL_B_MONGO_URI:mongodb://localhost:27017}
app.mongo.hospital-b.database=${HOSPITAL_B_MONGO_DATABASE:hospital_b}
app.mongo.hospital-b.auto-index-creation=${HOSPITAL_B_MONGO_AUTO_INDEX_CREATION:true}

# ── CORS / internal API phase-1 baseline ───────────────────
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
app.internal.service-token=${INTERNAL_SERVICE_TOKEN:change-me-before-service-splitting}

# update: creates tables on first run, then alters on schema changes (safe for dev)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=${JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# ── Actuator / health probes ───────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
info.app.name=health-bridge
info.app.description=FHIR R4 health record interoperability platform
info.app.phase=phase-1-baseline

# Use a 256-bit (32+ char) base64-encoded secret in prod.
jwt.secret=${JWT_SECRET:change-me-to-a-256-bit-base64-secret-in-prod-at-least-32-chars}
jwt.access-token-expiry-seconds=${JWT_ACCESS_TOKEN_EXPIRY_SECONDS:3600}
jwt.refresh-token-expiry-seconds=${JWT_REFRESH_TOKEN_EXPIRY_SECONDS:604800}
