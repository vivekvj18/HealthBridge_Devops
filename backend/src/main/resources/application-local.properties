# Local development profile
# Uses host-machine databases and Vite dev servers.

spring.datasource.fhir-main.jdbc-url=jdbc:postgresql://localhost:5432/fhir_main
spring.datasource.hospital-a.jdbc-url=jdbc:postgresql://localhost:5432/hospital_a_db
app.mongo.hospital-b.uri=mongodb://localhost:27017
app.mongo.hospital-b.database=hospital_b

app.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:5174,http://localhost:5175

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
